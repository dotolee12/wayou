<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 대동여지도 - Leaflet</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        /* 화면 꽉 차게 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 사이드바: 평소에는 왼쪽으로 숨김 */
        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: rgba(0, 0, 0, 0.9); padding: 25px 20px; z-index: 3000;
            transition: transform 0.3s ease-in-out;
            transform: translateX(-100%); /* 숨김 상태 */
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.active { transform: translateX(0); } /* 열림 상태 */

        /* 토글 메뉴 버튼 */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            background: #4ecdc4; color: black; padding: 12px 18px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
        }

        /* 내부 버튼들 */
        .btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none;
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-track { background: #4ecdc4; color: black; }
        .btn-track.recording { background: #ff6b6b; color: white; animation: blink 1.5s infinite; }
        .btn-close { background: #555; color: white; margin-bottom: 20px; }
        .btn-clear { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; margin-top: 30px; }

        .stats-card {
            background: rgba(255,255,255,0.1); padding: 20px;
            border-radius: 15px; margin-top: 20px;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰ 메뉴</button>

    <div class="sidebar" id="sidebar">
        <button class="btn btn-close" onclick="toggleSidebar()">✕ 닫기</button>
        <h2 style="color: #4ecdc4; margin-bottom: 5px;">📍 대동여지도 v2</h2>
        <p style="font-size: 13px; opacity: 0.7; margin-bottom: 25px;">나의 발자취를 기록합니다.</p>
        
        <button id="trackBtn" class="btn btn-track" onclick="toggleTracking()">추적 시작</button>
        
        <div class="stats-card">
            <p style="font-size: 14px; opacity: 0.8;">상태: <span id="status">대기 중</span></p>
            <p style="font-size: 24px; font-weight: bold; margin-top: 5px;"><span id="dist">0</span>m 이동</p>
        </div>

        <button class="btn btn-clear" onclick="clearPath()">기록 초기화</button>
    </div>

    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        let map, polyline, userMarker;
        let pathPoints = []; 
        let isTracking = false;
        let watchId = null;

        // 1. 지도 초기화
        function initMap() {
            // 초기 위치: 서울 (데이터가 있으면 마지막 위치로 이동)
            map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 16);
            
            // 어두운 밤 모드 지도 레이어 (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 로컬 스토리지에서 저장된 경로 불러오기
            const savedPath = localStorage.getItem('wayou_path');
            if (savedPath) {
                pathPoints = JSON.parse(savedPath);
                polyline = L.polyline(pathPoints, { color: '#4ecdc4', weight: 5, opacity: 0.8 }).addTo(map);
                if (pathPoints.length > 0) map.panTo(pathPoints[pathPoints.length - 1]);
            } else {
                polyline = L.polyline([], { color: '#4ecdc4', weight: 5, opacity: 0.8 }).addTo(map);
            }
            
            updateStats();
        }

        // 2. 사이드바 토글
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // 3. GPS 추적 토글
        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            const statusText = document.getElementById('status');

            if (!isTracking) {
                if ("geolocation" in navigator) {
                    isTracking = true;
                    btn.innerText = "추적 중지";
                    btn.classList.add('recording');
                    statusText.innerText = "기록 중...";
                    
                    watchId = navigator.geolocation.watchPosition(handleSuccess, handleError, {
                        enableHighAccuracy: true,
                        maximumAge: 0
                    });
                } else {
                    alert("이 브라우저는 GPS를 지원하지 않습니다.");
                }
            } else {
                isTracking = false;
                btn.innerText = "추적 시작";
                btn.classList.remove('recording');
                statusText.innerText = "중지됨";
                navigator.geolocation.clearWatch(watchId);
            }
        }

        // 4. 위치 갱신 성공 시 호출
        function handleSuccess(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const currentPos = [lat, lng];

            pathPoints.push(currentPos);
            polyline.setLatLngs(pathPoints);
            
            // 현재 위치 마커 업데이트
            if (!userMarker) {
                userMarker = L.circleMarker(currentPos, { radius: 7, color: '#fff', fillColor: '#4ecdc4', fillOpacity: 1 }).addTo(map);
            } else {
                userMarker.setLatLng(currentPos);
            }

            map.panTo(currentPos);
            
            // 데이터 저장
            localStorage.setItem('wayou_path', JSON.stringify(pathPoints));
            updateStats();
        }

        function handleError(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
        }

        function updateStats() {
            // 좌표 개당 대략 5m로 계산 (단순 시연용)
            document.getElementById('dist').innerText = pathPoints.length * 5;
        }

        function clearPath() {
            if(confirm("정말로 모든 이동 기록을 지울까요?")) {
                localStorage.removeItem('wayou_path');
                location.reload();
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
