<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 대동여지도 - Giloa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    /* 기본 레이아웃 */
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; background:#0a0a0f; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
    #map-wrap { position:absolute; inset:0; z-index:1; }
    #map { width:100%; height:100%; filter:grayscale(1) brightness(0.4) contrast(1.1); background:#0a0a0f; }
    #fog-canvas { position:absolute; inset:0; z-index:400; pointer-events:none; }

    /* 상단 바 */
    #top-bar {
        position:absolute; top:18px; left:18px; right:18px;
        display:flex; justify-content:space-between; align-items:center; z-index:1000;
    }
    #ham-btn {
        width:48px; height:48px; background:rgba(20,20,35,0.85); backdrop-filter:blur(10px);
        border:0.5px solid rgba(255,255,255,0.1); border-radius:13px; cursor:pointer;
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    }
    .hline { width:20px; height:1.5px; background:rgba(255,255,255,0.8); border-radius:2px; }

    #rec-status-box {
        padding:9px 18px; background:rgba(20,20,35,0.85); backdrop-filter:blur(10px);
        border:0.5px solid rgba(255,255,255,0.1); border-radius:22px; font-size:12px;
        color:rgba(255,255,255,0.5); display:flex; align-items:center; gap:7px;
    }
    #rec-status-box.recording { border-color:rgba(220,50,50,0.4); color:rgba(220,80,80,1); }
    #rec-blink { width:7px; height:7px; border-radius:50%; background:#e03232; animation:blink 1s infinite; display:none; }
    #rec-status-box.recording #rec-blink { display:block; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* 우하단 컨트롤 */
    #controls { position:absolute; bottom:105px; right:18px; z-index:1000; display:flex; flex-direction:column; gap:12px; }
    .ctrl-btn {
        width:54px; height:54px; border-radius:50%; background:rgba(20,20,35,0.9);
        backdrop-filter:blur(10px); border:0.5px solid rgba(255,255,255,0.15);
        cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .icon-rec { width:15px; height:15px; background:#e03232; border-radius:50%; }
    .icon-stop { width:15px; height:15px; background:#e03232; border-radius:3px; display:none; }
    #rec-btn.recording .icon-rec { display:none; }
    #rec-btn.recording .icon-stop { display:block; }
    #loc-btn { border:2px solid #f0c040; }
    #loc-btn.following { background:rgba(240,192,64,0.2); }
    .icon-loc-ring { width:20px; height:20px; border-radius:50%; border:2px solid #f0c040; display:flex; align-items:center; justify-content:center; }
    .icon-loc-dot { width:7px; height:7px; border-radius:50%; background:#f0c040; }

    /* 하단 HUD */
    #hud {
        position:absolute; bottom:0; left:0; right:0; height:88px;
        background:rgba(12,12,22,0.95); backdrop-filter:blur(15px);
        border-top:0.5px solid rgba(255,255,255,0.1); display:flex; align-items:center; padding:0 28px; z-index:999;
    }
    .stat { flex:1; }
    .stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-transform:uppercase; }
    .stat-value { font-size:20px; font-weight:600; color:#fff; margin-top:2px; }
    .stat-value span { font-size:12px; opacity:0.4; margin-left:3px; }

    /* 현재 위치 마커 */
    .player-core { width:12px; height:12px; border-radius:50%; background:#f0c040; border:2px solid #fff; box-shadow:0 0 10px #f0c040; }

    /* GPS 토스트 */
    #toast {
        position:absolute; top:80px; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.8); color:#fff; padding:8px 16px; border-radius:20px;
        font-size:11px; z-index:2000; opacity:0; transition:0.3s; pointer-events:none;
    }
    #toast.show { opacity:1; }
</style>
</head>
<body>

<div id="map-wrap"><div id="map"></div></div>
<canvas id="fog-canvas"></canvas>
<div id="toast">GPS 신호를 찾는 중...</div>

<div id="top-bar">
    <div id="ham-btn"><div class="hline"></div><div class="hline"></div><div class="hline"></div></div>
    <div id="rec-status-box">
        <div id="rec-blink"></div>
        <span id="rec-text">기록 중단</span>
    </div>
</div>

<div id="controls">
    <div id="rec-btn" class="ctrl-btn" onclick="toggleRecording()"><div class="icon-rec"></div><div class="icon-stop"></div></div>
    <div id="loc-btn" class="ctrl-btn" onclick="centerMap()"><div class="icon-loc-ring"><div class="icon-loc-dot"></div></div></div>
</div>

<div id="hud">
    <div class="stat">
        <div class="stat-label">TODAY DISTANCE</div>
        <div id="stat-dist" class="stat-value">0.00<span>km</span></div>
    </div>
    <div class="stat">
        <div class="stat-label">TOTAL MEMORIES</div>
        <div id="stat-memo" class="stat-value">0<span>개</span></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ══════════════════════════════════════
    // 1. 초기 상태 및 명암 규칙
    // ══════════════════════════════════════
    let isRecording = false;
    let currentPos = null;
    let followMode = false;
    let playerMarker = null;
    let pathHistory = []; // {lat, lng, timestamp, sessionId}
    let sessionId = Date.now();
    let todayDist = 0;
    let totalDist = 0;

    const FADE_RULES = [
        { maxDays: 1,    alpha: 1.00 }, // 오늘: 100%
        { maxDays: 2,    alpha: 0.90 }, // 어제: 90%
        { maxDays: 7,    alpha: 0.80 }, // 일주일: 80%
        { maxDays: 30,   alpha: 0.70 }, // 한달: 70%
        { maxDays: 365,  alpha: 0.60 }, // 일년: 60%
        { maxDays: Infinity, alpha: 0.55 } // 그 이상: 55%
    ];

    // ══════════════════════════════════════
    // 2. 지도 및 캔버스 설정
    // ══════════════════════════════════════
    const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([37.5665, 126.9780], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const canvas = document.getElementById('fog-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        renderFog();
    }
    window.addEventListener('resize', resize);
    map.on('move zoom', renderFog);

    // ══════════════════════════════════════
    // 3. 렌더링 엔진 (명암 층위 구현)
    // ══════════════════════════════════════
    function renderFog() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        // 기본 안개 (지형이 살짝 보이게)
        ctx.fillStyle = 'rgba(10, 10, 25, 0.75)';
        ctx.fillRect(0, 0, W, H);

        if (pathHistory.length < 1) return;

        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        const now = Date.now();
        const lineWidth = metersToPixels(12); // 12m 너비로 도려내기

        FADE_RULES.forEach((rule, idx) => {
            const minDays = idx === 0 ? 0 : FADE_RULES[idx-1].maxDays;
            const pts = pathHistory.filter(p => {
                const days = (now - p.timestamp) / 86400000;
                return days >= minDays && days < rule.maxDays;
            });

            if (pts.length > 0) {
                ctx.globalAlpha = rule.alpha;
                ctx.lineWidth = lineWidth;
                
                let lastSid = null;
                pts.forEach(p => {
                    const px = map.latLngToContainerPoint([p.lat, p.lng]);
                    if (p.sessionId !== lastSid) {
                        if (lastSid !== null) ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(px.x, px.y);
                    } else {
                        ctx.lineTo(px.x, px.y);
                    }
                    lastSid = p.sessionId;
                });
                ctx.stroke();
            }
        });
        ctx.restore();
    }

    function metersToPixels(meters) {
        const center = map.getCenter();
        const lat = center.lat;
        const zoom = map.getZoom();
        const mpp = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
        return meters / mpp;
    }

    // ══════════════════════════════════════
    // 4. 데이터 저장 및 로드 (LocalStorage)
    // ══════════════════════════════════════
    function saveToStorage() {
        const data = {
            pathHistory, totalDist, todayDist,
            lastDate: new Date().toDateString()
        };
        localStorage.setItem('giloa_data', JSON.stringify(data));
    }

    function loadFromStorage() {
        const raw = localStorage.getItem('giloa_data');
        if (!raw) return;
        const data = JSON.parse(raw);
        pathHistory = data.pathHistory || [];
        totalDist = data.totalDist || 0;
        
        // 날짜가 같으면 오늘 거리 유지, 다르면 0으로 리셋
        todayDist = (data.lastDate === new Date().toDateString()) ? (data.todayDist || 0) : 0;
        
        updateStats();
        renderFog();
    }

    // ══════════════════════════════════════
    // 5. 위치 추적 및 기록 로직
    // ══════════════════════════════════════
    function handleLocation(latlng, accuracy) {
        if (accuracy > 35) return; // 부정확한 신호 무시
        currentPos = latlng;

        if (!playerMarker) {
            playerMarker = L.marker(latlng, { icon: L.divIcon({ className:'player-core', iconSize:[12,12] }) }).addTo(map);
            map.setView(latlng, 16);
        } else {
            playerMarker.setLatLng(latlng);
            if (followMode) map.panTo(latlng);
        }

        if (isRecording) {
            if (pathHistory.length > 0) {
                const last = pathHistory[pathHistory.length - 1];
                const d = latlng.distanceTo([last.lat, last.lng]);
                
                // 세션이 같고 10m 이상 이동했을 때만 기록
                if (last.sessionId !== sessionId || d > 10) {
                    if (last.sessionId === sessionId) {
                        todayDist += d;
                        totalDist += d;
                    }
                    pathHistory.push({ lat:latlng.lat, lng:latlng.lng, timestamp:Date.now(), sessionId });
                    updateStats();
                    saveToStorage();
                    renderFog();
                }
            } else {
                pathHistory.push({ lat:latlng.lat, lng:latlng.lng, timestamp:Date.now(), sessionId });
            }
        }
    }

    function toggleRecording() {
        isRecording = !isRecording;
        if (isRecording) sessionId = Date.now(); // 새 세션 시작
        
        document.getElementById('rec-btn').classList.toggle('recording', isRecording);
        document.getElementById('rec-status-box').classList.toggle('recording', isRecording);
        document.getElementById('rec-text').innerText = isRecording ? '기록 중' : '기록 중단';
        saveToStorage();
    }

    function centerMap() {
        if (!currentPos) return;
        followMode = true;
        document.getElementById('loc-btn').classList.add('following');
        map.panTo(currentPos);
    }

    map.on('dragstart', () => {
        followMode = false;
        document.getElementById('loc-btn').classList.remove('following');
    });

    function updateStats() {
        document.getElementById('stat-dist').innerHTML = (todayDist / 1000).toFixed(2) + '<span>km</span>';
        document.getElementById('stat-memo').innerHTML = Math.floor(totalDist / 500) + '<span>개</span>';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ══════════════════════════════════════
    // 6. 실행
    // ══════════════════════════════════════
    resize();
    loadFromStorage();

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            pos => handleLocation(L.latLng(pos.coords.latitude, pos.coords.longitude), pos.coords.accuracy),
            err => showToast('GPS 연결 실패'),
            { enableHighAccuracy:true, maximumAge:0, timeout:10000 }
        );
    } else {
        showToast('GPS 미지원 브라우저');
    }
</script>
</body>
</html>
