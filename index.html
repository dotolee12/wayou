<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>New Daedongyeojido - Project Giloa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    #map-wrap { position: absolute; inset: 0; z-index: 1; }
    #map { width: 100%; height: 100%; filter: grayscale(1) contrast(1.08); }

    #fog-canvas,
    #color-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }
    #fog-canvas { z-index: 400; }
    #color-canvas { z-index: 401; }

    #top-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
    }

    #ham-btn,
    .btn {
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(30,30,45,0.8);
        color: #fff;
        backdrop-filter: blur(10px);
        cursor: pointer;
    }

    #ham-btn {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
    }

    .hline {
        width: 20px;
        height: 2px;
        background: #fff;
        border-radius: 1px;
    }

    #rec-status-box {
        padding: 10px 16px;
        border-radius: 12px;
        background: rgba(30,30,45,0.7);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
        text-align: right;
        backdrop-filter: blur(5px);
        transition: 0.25s ease;
        max-width: min(72vw, 340px);
    }

    #rec-status-box.recording {
        border-color: #ff5555;
        color: #ff7777;
        box-shadow: 0 0 14px rgba(255,85,85,0.28);
    }

    #rec-status-box.warning {
        border-color: #f0c040;
        color: #f0c040;
    }

    #sidebar {
        position: fixed;
        top: 0;
        left: -320px;
        width: 320px;
        max-width: calc(100vw - 40px);
        height: 100%;
        z-index: 2000;
        padding: 24px 20px;
        color: #fff;
        background: rgba(20,20,30,0.96);
        backdrop-filter: blur(16px);
        box-shadow: 6px 0 18px rgba(0,0,0,0.45);
        overflow-y: auto;
        transition: left 0.3s ease;
    }

    #sidebar.open { left: 0; }

    #sidebar-overlay {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 1999;
        background: rgba(0,0,0,0.5);
    }

    #sidebar-overlay.show { display: block; }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }

    .sidebar-header h2 {
        font-size: 18px;
        color: #f0c040;
    }

    .close-btn {
        font-size: 20px;
        cursor: pointer;
        opacity: 0.85;
    }

    .memory-item {
        margin-bottom: 10px;
        padding: 14px;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer;
        transition: 0.2s ease;
    }

    .memory-item:hover {
        border-color: #f0c040;
        background: rgba(255,255,255,0.08);
    }

    .item-name {
        display: block;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .item-date {
        display: block;
        font-size: 12px;
        color: rgba(255,255,255,0.6);
    }

    .empty-message {
        margin-top: 52px;
        text-align: center;
        line-height: 1.6;
        opacity: 0.55;
    }

    #controls {
        position: absolute;
        right: 20px;
        bottom: 110px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    #rec-btn.recording .icon-rec { display: none; }
    #rec-btn.recording .icon-stop { display: block; }
    #rec-btn .icon-stop { display: none; }

    .icon-stop {
        width: 14px;
        height: 14px;
        background: #ff4444;
        border-radius: 2px;
    }

    .icon-rec {
        width: 14px;
        height: 14px;
        background: #ff4444;
        border-radius: 50%;
    }

    .icon-loc {
        width: 10px;
        height: 10px;
        background: #f0c040;
        border-radius: 50%;
        box-shadow: 0 0 8px #f0c040;
    }

    #hud {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 90px;
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 24px;
        background: rgba(20,20,30,0.86);
        border-top: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
    }

    .stat { flex: 1; min-width: 0; }

    .label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: rgba(255,255,255,0.42);
    }

    .value {
        margin-top: 4px;
        font-size: 20px;
        font-weight: 600;
        color: #fff;
    }

    .value span {
        margin-left: 2px;
        font-size: 16px;
        color: rgba(255,255,255,0.8);
    }

    .player-marker {
        width: 16px;
        height: 16px;
        background: #f0c040;
        border: 2px solid #fff;
        border-radius: 50%;
        box-shadow: 0 0 10px #f0c040;
    }

    .memory-marker {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
    }

    @media (max-width: 640px) {
        #top-bar { top: 14px; left: 14px; right: 14px; }
        #controls { right: 14px; bottom: 104px; }
        #hud { height: 84px; padding: 0 16px; }
        .value { font-size: 18px; }
    }
</style>
</head>
<body>
<div id="sidebar">
    <div class="sidebar-header">
        <h2>나의 기록들</h2>
        <span class="close-btn" onclick="toggleSidebar(false)">&times;</span>
    </div>
    <div id="memory-list-container">
        <p class="empty-message">아직 기록이 없습니다.</p>
    </div>
</div>
<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div id="map-wrap"><div id="map"></div></div>
<canvas id="fog-canvas"></canvas>
<canvas id="color-canvas"></canvas>

<div id="top-bar">
    <div id="ham-btn" onclick="toggleSidebar()">
        <div class="hline"></div>
        <div class="hline"></div>
        <div class="hline"></div>
    </div>
    <div id="rec-status-box">[중단]<br>기록 대기 중</div>
</div>

<div id="controls">
    <div id="rec-btn" class="btn" onclick="toggleRecording()" aria-label="기록 시작 또는 중지">
        <div class="icon-rec"></div>
        <div class="icon-stop"></div>
    </div>
    <div id="memo-btn" class="btn" onclick="addMemory()" aria-label="메모 추가">⭐</div>
    <div id="loc-btn" class="btn" onclick="centerMap()" aria-label="내 위치로 이동">
        <div class="icon-loc"></div>
    </div>
</div>

<div id="hud">
    <div class="stat">
        <div class="label">TOTAL DISTANCE</div>
        <div id="dist-val" class="value">0.00<span>km</span></div>
    </div>
    <div class="stat">
        <div class="label">MEMORIES</div>
        <div id="memo-val" class="value">0</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const STORAGE_KEY = "giloa-v1-clean";
    const DEFAULT_VIEW = [37.5665, 126.9780];
    const DEFAULT_ZOOM = 16;
    const MIN_MOVE_METERS = 5;
    const FOG_RADIUS_METERS = 15;
    const MAX_ACCEPTABLE_ACCURACY = 80;
    const SAVE_DELAY_MS = 800;

    const map = L.map("map", {
        zoomControl: false,
        attributionControl: false
    }).setView(DEFAULT_VIEW, DEFAULT_ZOOM);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 20
    }).addTo(map);

    const fogCanvas = document.getElementById("fog-canvas");
    const colorCanvas = document.getElementById("color-canvas");
    const fogCtx = fogCanvas.getContext("2d");
    const colorCtx = colorCanvas.getContext("2d");

    const recBtn = document.getElementById("rec-btn");
    const recStatusBox = document.getElementById("rec-status-box");
    const distValEl = document.getElementById("dist-val");
    const memoValEl = document.getElementById("memo-val");
    const memoryListContainer = document.getElementById("memory-list-container");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebar-overlay");

    let isRecording = false;
    let currentPos = null;
    let pathCoordinates = [];
    let memories = [];
    let totalDistance = 0;
    let playerMarker = null;
    let locationWatchId = null;
    let hasCenteredOnUser = false;
    let renderFrameId = null;
    let persistTimerId = null;

    loadState();
    renderStoredMarkers();
    updateStats();
    updateMemoryList();
    updateRecordingUI();
    resizeCanvas();
    scheduleRender();

    window.addEventListener("resize", resizeCanvas);
    map.on("move zoom", scheduleRender);

    function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const width = window.innerWidth;
        const height = window.innerHeight;

        fogCanvas.width = Math.floor(width * dpr);
        fogCanvas.height = Math.floor(height * dpr);
        colorCanvas.width = Math.floor(width * dpr);
        colorCanvas.height = Math.floor(height * dpr);

        fogCanvas.style.width = width + "px";
        fogCanvas.style.height = height + "px";
        colorCanvas.style.width = width + "px";
        colorCanvas.style.height = height + "px";

        fogCtx.setTransform(1, 0, 0, 1, 0, 0);
        colorCtx.setTransform(1, 0, 0, 1, 0, 0);
        fogCtx.scale(dpr, dpr);
        colorCtx.scale(dpr, dpr);

        scheduleRender();
    }

    function scheduleRender() {
        if (renderFrameId !== null) return;
        renderFrameId = requestAnimationFrame(() => {
            renderFrameId = null;
            render();
        });
    }

    function render() {
        renderFog();
        renderColorLayer();
    }

    function renderFog() {
        fogCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        fogCtx.fillStyle = "rgba(10, 10, 25, 0.72)";
        fogCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        if (pathCoordinates.length === 0) return;

        const radius = getMetersToPixels(FOG_RADIUS_METERS);
        const now = Date.now();

        fogCtx.save();
        fogCtx.globalCompositeOperation = "destination-out";

        pathCoordinates.forEach((point, index) => {
            const diffDays = (now - point.startTime) / 86400000;
            const clearAmount = Math.max(0.4, 1 - Math.floor(diffDays) * 0.01);
            const pos = map.latLngToContainerPoint([point.lat, point.lng]);

            fogCtx.globalAlpha = clearAmount;

            fogCtx.beginPath();
            fogCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            fogCtx.fill();

            if (index > 0) {
                const prev = pathCoordinates[index - 1];
                const prevPos = map.latLngToContainerPoint([prev.lat, prev.lng]);

                fogCtx.beginPath();
                fogCtx.lineWidth = radius * 2;
                fogCtx.lineCap = "round";
                fogCtx.lineJoin = "round";
                fogCtx.moveTo(prevPos.x, prevPos.y);
                fogCtx.lineTo(pos.x, pos.y);
                fogCtx.stroke();
            }
        });

        fogCtx.restore();
    }

    function renderColorLayer() {
        colorCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        const radius = getMetersToPixels(FOG_RADIUS_METERS);

        pathCoordinates.forEach((point) => {
            const stayMin = (point.endTime - point.startTime) / 60000;
            if (stayMin < 10) return;

            const opacity = Math.min(0.5, ((stayMin - 10) / 50) * 0.5);
            const pos = map.latLngToContainerPoint([point.lat, point.lng]);
            const gradient = colorCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);

            gradient.addColorStop(0, `rgba(80, 200, 100, ${opacity})`);
            gradient.addColorStop(0.5, `rgba(60, 170, 80, ${opacity * 0.6})`);
            gradient.addColorStop(1, "rgba(40, 140, 60, 0)");

            colorCtx.beginPath();
            colorCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            colorCtx.fillStyle = gradient;
            colorCtx.fill();
        });
    }

    function getMetersToPixels(meters) {
        const center = map.getCenter();
        const point = map.latLngToContainerPoint(center);
        const shifted = map.containerPointToLatLng(L.point(point.x + 10, point.y));
        const metersPer10px = center.distanceTo(shifted);
        if (!metersPer10px) return 1;
        return (meters / metersPer10px) * 10;
    }

    function toggleRecording() {
        if (isRecording) {
            stopRecording("기록이 중지되었습니다.");
        } else {
            startRecording();
        }
    }

    function startRecording() {
        if (!("geolocation" in navigator)) {
            setStatus("warning", "[오류]", "이 브라우저는 위치 추적을 지원하지 않습니다.");
            return;
        }

        if (!window.isSecureContext && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
            setStatus("warning", "[주의]", "위치 추적은 HTTPS 또는 localhost에서만 동작합니다.");
            return;
        }

        isRecording = true;
        updateRecordingUI();
        setStatus("recording", "[기록중]", "위치 정보를 수신 중입니다.");

        locationWatchId = navigator.geolocation.watchPosition(
            handlePosition,
            handleLocationError,
            {
                enableHighAccuracy: true,
                maximumAge: 3000,
                timeout: 15000
            }
        );
    }

    function stopRecording(message) {
        isRecording = false;
        updateRecordingUI();

        if (locationWatchId !== null) {
            navigator.geolocation.clearWatch(locationWatchId);
            locationWatchId = null;
        }

        if (persistTimerId !== null) {
            clearTimeout(persistTimerId);
            persistTimerId = null;
        }

        setStatus("", "[중단]", message || "기록 대기 중");
        persistState();
    }

    function updateRecordingUI() {
        recBtn.classList.toggle("recording", isRecording);
        recStatusBox.classList.toggle("recording", isRecording);
    }

    function handlePosition(position) {
        const latlng = L.latLng(position.coords.latitude, position.coords.longitude);
        const accuracy = position.coords.accuracy || 0;
        currentPos = latlng;

        updatePlayerMarker(latlng);

        if (!hasCenteredOnUser) {
            map.setView(latlng, DEFAULT_ZOOM);
            hasCenteredOnUser = true;
        }

        if (!isRecording) return;

        if (accuracy > MAX_ACCEPTABLE_ACCURACY) {
            setStatus("warning", "[주의]", "GPS 정확도가 낮습니다. 잠시 후 다시 시도해 주세요.");
            return;
        }

        const now = Date.now();

        if (pathCoordinates.length === 0) {
            pathCoordinates.push(createPathPoint(latlng, now));
            updateStats();
            schedulePersist();
            scheduleRender();
            setStatus("recording", "[기록중]", "첫 위치를 기록했습니다.");
            return;
        }

        const last = pathCoordinates[pathCoordinates.length - 1];
        const lastLatLng = L.latLng(last.lat, last.lng);
        const distance = latlng.distanceTo(lastLatLng);

        if (distance <= MIN_MOVE_METERS) {
            last.endTime = now;
        } else {
            totalDistance += distance;
            pathCoordinates.push(createPathPoint(latlng, now));
        }

        updateStats();
        schedulePersist();
        scheduleRender();
    }

    function handleLocationError(error) {
        stopRecording("위치 추적이 중지되었습니다.");

        let message = "위치 정보를 가져오지 못했습니다.";
        if (error.code === 1) message = "위치 권한이 거부되었습니다.";
        if (error.code === 2) message = "현재 위치를 확인할 수 없습니다.";
        if (error.code === 3) message = "위치 요청 시간이 초과되었습니다.";

        setStatus("warning", "[오류]", message);
        alert(message + "\nHTTPS 환경 또는 브라우저 위치 권한을 확인해 주세요.");
    }

    function updatePlayerMarker(latlng) {
        if (!playerMarker) {
            playerMarker = L.marker(latlng, {
                icon: L.divIcon({
                    className: "player-marker",
                    iconSize: [16, 16]
                })
            }).addTo(map);
            return;
        }

        playerMarker.setLatLng(latlng);
    }

    function setStatus(mode, title, detail) {
        recStatusBox.classList.remove("recording", "warning");
        if (mode) recStatusBox.classList.add(mode);
        recStatusBox.innerHTML = `${title}<br>${detail}`;
    }

    function updateStats() {
        distValEl.innerHTML = `${(totalDistance / 1000).toFixed(2)}<span>km</span>`;
        memoValEl.textContent = String(memories.length);
    }

    function addMemory() {
        if (!currentPos) {
            alert("위치 정보를 수신한 뒤에 메모를 남길 수 있습니다.");
            return;
        }

        const input = prompt("이 장소의 이름을 입력하세요:", "새로운 발견");
        if (input === null) return;

        const name = input.trim() || "기억의 지점";
        const now = new Date();

        const memory = {
            id: String(now.getTime()),
            lat: currentPos.lat,
            lng: currentPos.lng,
            name,
            time: now.getTime(),
            dateString: now.toLocaleDateString("ko-KR", {
                year: "numeric",
                month: "long",
                day: "numeric"
            })
        };

        memories.push(memory);
        createMemoryMarker(memory, true);
        updateMemoryList();
        updateStats();
        schedulePersist();
    }

    function createMemoryMarker(memory, openPopup = false) {
        const marker = L.marker([memory.lat, memory.lng], {
            icon: L.divIcon({
                className: "memory-marker",
                html: "📍",
                iconSize: [30, 30]
            })
        }).addTo(map);

        marker.bindPopup(
            `<b>${escapeHtml(memory.name)}</b><br><small>${memory.dateString} 기록</small>`
        );

        if (openPopup) marker.openPopup();
    }

    function renderStoredMarkers() {
        memories.forEach((memory) => createMemoryMarker(memory, false));
    }

    function updateMemoryList() {
        if (memories.length === 0) {
            memoryListContainer.innerHTML = '<p class="empty-message">아직 기록이 없습니다.</p>';
            return;
        }

        memoryListContainer.innerHTML = "";

        [...memories].reverse().forEach((memory) => {
            const item = document.createElement("div");
            item.className = "memory-item";
            item.innerHTML = `
                <span class="item-name">📍 ${escapeHtml(memory.name)}</span>
                <span class="item-date">${memory.dateString}</span>
            `;
            item.onclick = () => {
                map.flyTo([memory.lat, memory.lng], 17);
                toggleSidebar(false);
            };
            memoryListContainer.appendChild(item);
        });
    }

    function toggleSidebar(forceOpen) {
        const willOpen = typeof forceOpen === "boolean"
            ? forceOpen
            : !sidebar.classList.contains("open");

        sidebar.classList.toggle("open", willOpen);
        sidebarOverlay.classList.toggle("show", willOpen);
    }

    function centerMap() {
        if (!currentPos) {
            alert("아직 현재 위치를 받지 못했습니다.");
            return;
        }
        map.panTo(currentPos);
    }

    function createPathPoint(latlng, timestamp) {
        return {
            lat: latlng.lat,
            lng: latlng.lng,
            startTime: timestamp,
            endTime: timestamp
        };
    }

    function schedulePersist() {
        if (persistTimerId !== null) {
            clearTimeout(persistTimerId);
        }

        persistTimerId = setTimeout(() => {
            persistTimerId = null;
            persistState();
        }, SAVE_DELAY_MS);
    }

    function persistState() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                pathCoordinates,
                memories,
                totalDistance
            }));
        } catch (error) {
            console.error("저장 실패", error);
        }
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;

            const parsed = JSON.parse(raw);

            pathCoordinates = Array.isArray(parsed.pathCoordinates)
                ? parsed.pathCoordinates.filter(isValidPathPoint)
                : [];

            memories = Array.isArray(parsed.memories)
                ? parsed.memories.filter(isValidMemory)
                : [];

            totalDistance = Number.isFinite(parsed.totalDistance)
                ? parsed.totalDistance
                : 0;
        } catch (error) {
            console.error("복원 실패", error);
            pathCoordinates = [];
            memories = [];
            totalDistance = 0;
        }
    }

    function isValidPathPoint(point) {
        return point
            && Number.isFinite(point.lat)
            && Number.isFinite(point.lng)
            && Number.isFinite(point.startTime)
            && Number.isFinite(point.endTime);
    }

    function isValidMemory(memory) {
        return memory
            && Number.isFinite(memory.lat)
            && Number.isFinite(memory.lng)
            && typeof memory.name === "string"
            && typeof memory.dateString === "string";
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
</script>
</body>
</html>
