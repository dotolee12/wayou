<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 대동여지도 - GPS 경로 추적</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        /* 기본 레이아웃 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        .container { display: flex; height: 100vh; position: relative; }
        #map { flex: 1; height: 100vh; width: 100%; z-index: 1; }

        /* 사이드바 스타일 */
        .sidebar {
            width: 280px; background: rgba(0, 0, 0, 0.9); padding: 20px;
            overflow-y: auto; z-index: 1000; border-right: 1px solid #444;
            transition: transform 0.3s;
        }
        .sidebar.collapsed { transform: translateX(-100%); position: absolute; }

        /* 버튼 스타일 */
        button {
            width: 100%; padding: 12px; margin: 5px 0; border: none;
            border-radius: 8px; background: #4ecdc4; color: black;
            font-weight: bold; cursor: pointer;
        }
        button.tracking { background: #ff6b6b; color: white; animation: pulse 1.5s infinite; }
        
        /* 플로팅 컨트롤 (모바일용) */
        .toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 2000;
            background: #4ecdc4; padding: 10px; border-radius: 5px; color: black;
        }

        .stats-box {
            background: rgba(255,255,255,0.1); padding: 10px;
            border-radius: 8px; margin-top: 15px; font-size: 14px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="toggle-btn" onclick="toggleSidebar()">메뉴</div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <h2 style="color: #4ecdc4; margin-bottom: 20px;">🗺️ 대동여지도 v2</h2>
            <p style="font-size: 12px; margin-bottom: 15px; opacity: 0.8;">걸음마다 기록이 남고, 시간에 따라 색이 변합니다.</p>
            
            <button id="trackBtn" onclick="toggleTracking()">📍 추적 시작</button>
            <button onclick="centerMap()">🎯 내 위치로</button>
            
            <div class="stats-box">
                <p>거리: <span id="dist">0m</span></p>
                <p>상태: <span id="status">대기 중</span></p>
            </div>

            <button onclick="clearData()" style="background: #555; color: white; margin-top: 20px;">🗑️ 기록 삭제</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        let map, userMarker, watchId = null;
        let isTracking = false;
        let pathPoints = [];
        let polyline;

        // 1. 지도 초기화
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
            
            // 어두운 테마 지도 사용
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // 저장된 데이터 불러오기
            const savedPath = localStorage.getItem('myPath');
            if (savedPath) {
                pathPoints = JSON.parse(savedPath);
                polyline = L.polyline(pathPoints, { color: '#4ecdc4', weight: 5 }).addTo(map);
                if (pathPoints.length > 0) map.panTo(pathPoints[pathPoints.length - 1]);
            } else {
                polyline = L.polyline([], { color: '#4ecdc4', weight: 5 }).addTo(map);
            }
        }

        // 2. 추적 토글
        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            if (!isTracking) {
                if ("geolocation" in navigator) {
                    isTracking = true;
                    btn.innerText = "⏹️ 추적 중지";
                    btn.classList.add('tracking');
                    document.getElementById('status').innerText = "기록 중...";
                    
                    watchId = navigator.geolocation.watchPosition(successGPS, errorGPS, {
                        enableHighAccuracy: true,
                        maximumAge: 0
                    });
                }
            } else {
                isTracking = false;
                btn.innerText = "📍 추적 시작";
                btn.classList.remove('tracking');
                document.getElementById('status').innerText = "중지됨";
                navigator.geolocation.clearWatch(watchId);
            }
        }

        // 3. GPS 성공 시
        function successGPS(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const newPoint = [lat, lng];

            pathPoints.push(newPoint);
            polyline.setLatLngs(pathPoints);
            
            // 내 위치 마커 업데이트
            if (!userMarker) {
                userMarker = L.circleMarker(newPoint, { radius: 8, color: '#fff', fillColor: '#4ecdc4', fillOpacity: 1 }).addTo(map);
            } else {
                userMarker.setLatLng(newPoint);
            }

            map.panTo(newPoint);
            
            // 로컬 저장소에 저장 (새로고침해도 유지)
            localStorage.setItem('myPath', JSON.stringify(pathPoints));
            document.getElementById('dist').innerText = (pathPoints.length * 5) + "m"; // 단순 계산
        }

        function errorGPS() { alert("GPS를 켤 수 없습니다."); }
        function centerMap() { if (userMarker) map.panTo(userMarker.getLatLng()); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function clearData() { if(confirm("모든 경로를 지울까요?")) { localStorage.removeItem('myPath'); location.reload(); } }

        window.onload = initMap;
    </script>
</body>
</html>
