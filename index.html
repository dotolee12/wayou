<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wayou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 1. Jeremy님이 주문하신 깔끔한 햄버거 버튼 (image_133de1.png 스타일) */
        .hamburger-icon {
            position: fixed; top: 25px; left: 20px; z-index: 2000;
            cursor: pointer; width: 35px;
        }
        .hamburger-icon .line { 
            width: 100%; height: 3px; background: #e0e0e0; /* 연한 회색/흰색 */
            margin: 6px 0; border-radius: 1px; 
        }

        /* 2. 메뉴 오버레이 및 컨테이너 (그림 image_30caa0.png 기반) */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.5); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        .menu-overlay.active { display: flex; }

        .menu-container {
            width: 85%; max-width: 320px; background: #c0c0c0; /* 회색 박스 */
            padding: 10px 20px 30px 20px; border-radius: 10px; 
            border: 2px solid #00aaff; position: relative;
        }

        /* 메뉴 상단 ㅡ 닫기 핸들 */
        .close-handle { 
            width: 50px; height: 5px; background: white; 
            margin: 5px auto 20px auto; border-radius: 10px; cursor: pointer; 
        }

        /* 빨간색 메뉴 버튼들 */
        .mem-btn {
            width: 100%; background: #ff4d4d; color: black; border: none;
            padding: 15px; margin: 10px 0; border-radius: 12px;
            font-size: 18px; font-weight: bold; display: flex; align-items: center; cursor: pointer;
        }
        .dot { width: 22px; height: 22px; border-radius: 50%; margin-right: 15px; border: 1px solid rgba(0,0,0,0.2); }

        /* 3. 하단 정보 패널 (그림 image_30ce7b.jpg 기반) */
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 22vh;
            background: rgba(220, 220, 220, 0.9); color: black;
            padding: 25px 30px; z-index: 1500;
        }
        .bottom-panel p { font-size: 19px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hamburger-icon" onclick="toggleMenu(event)">
        <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(event)">
        <div class="menu-container" onclick="event.stopPropagation()">
            <div class="close-handle" onclick="toggleMenu(event)"></div>
            <button class="mem-btn" style="height: 60px; background: #ff4d4d;"></button> <button class="mem-btn" onclick="centerMap()"><div class="dot" style="background: yellow;"></div>현 위치로</button>
            <button class="mem-btn" onclick="startMemory('blue')"><div class="dot" style="background: blue;"></div>기억1</button>
            <button class="mem-btn" onclick="startMemory('lime')"><div class="dot" style="background: lime;"></div>기억2</button>
            <button class="mem-btn" onclick="startMemory('fuchsia')"><div class="dot" style="background: fuchsia;"></div>기억3</button>
            <button class="mem-btn" style="background: #ff4d4d;"><div class="dot" style="background: #555;"></div>오래된 기억들</button>
        </div>
    </div>

    <div class="bottom-panel">
        <p>오늘 걸은 거리 &nbsp; 13km</p>
        <p>새로운 길 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 5km</p>
    </div>

    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        let map;
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function toggleMenu(e) { 
            if(e) e.stopPropagation(); 
            document.getElementById('menuOverlay').classList.toggle('active'); 
        }

        function centerMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.flyTo([pos.coords.latitude, pos.coords.longitude], 17);
                    toggleMenu();
                });
            }
        }

        function startMemory(color) {
            alert(color + " 기록을 시작합니다.");
            toggleMenu();
        }

        window.onload = initMap;
    </script>
</body>
</html>
